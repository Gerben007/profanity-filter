<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profanity Filter</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #0f172a; }
    .mono { font-family: ui-monospace, monospace; }
    tr.selected { background: #1e3a5f !important; }
    .tab-active { border-bottom: 2px solid #3b82f6; color: #e2e8f0; }
    .tab-inactive { border-bottom: 2px solid transparent; color: #64748b; }
  </style>
</head>
<body class="text-slate-200 min-h-screen">

  <!-- Header -->
  <header class="bg-slate-800 border-b border-slate-700 px-6 py-3 flex items-center justify-between">
    <h1 class="text-lg font-semibold tracking-wide">Profanity Filter</h1>
    <div class="flex items-center gap-3">
      <span id="health-chip" class="text-xs px-3 py-1 rounded-full bg-slate-700 text-slate-400 mono">loading…</span>
    </div>
  </header>

  <!-- Nav tabs -->
  <nav class="bg-slate-800 border-b border-slate-700 px-6 flex gap-6">
    <button onclick="showPage('jobs')" id="tab-jobs" class="tab-active py-2.5 text-sm font-medium transition">Jobs</button>
    <button onclick="showPage('words')" id="tab-words" class="tab-inactive py-2.5 text-sm font-medium transition">Bad Words</button>
  </nav>

  <main class="max-w-5xl mx-auto px-4 py-6 space-y-6">

    <!-- ═══════════════ JOBS PAGE ═══════════════ -->
    <div id="page-jobs">

      <!-- Submit job -->
      <section class="bg-slate-800 rounded-xl p-5 border border-slate-700">
        <h2 class="text-sm font-semibold text-slate-400 uppercase tracking-wider mb-3">Submit Job</h2>
        <div class="flex gap-2">
          <input id="file-path" type="text" placeholder="Click Browse or type a path…"
            class="flex-1 bg-slate-900 border border-slate-600 rounded px-3 py-2 text-sm mono text-slate-200 placeholder-slate-500 focus:outline-none focus:border-blue-500 cursor-pointer"
            readonly onclick="openBrowser()" />
          <button onclick="openBrowser()"
            class="px-4 py-2 bg-slate-700 hover:bg-slate-600 rounded text-sm transition">Browse</button>
          <button onclick="submitJob()"
            class="px-5 py-2 bg-blue-600 hover:bg-blue-500 rounded text-sm font-medium transition">Process</button>
        </div>
        <p id="submit-msg" class="text-xs mt-2 h-4"></p>
      </section>

      <!-- Job list -->
      <section class="bg-slate-800 rounded-xl border border-slate-700 overflow-hidden">
        <div class="flex items-center justify-between px-5 py-3 border-b border-slate-700">
          <div class="flex gap-4">
            <button onclick="setJobFilter('all')"    id="jf-all"        class="text-xs font-medium py-1 transition">All</button>
            <button onclick="setJobFilter('queued')" id="jf-queued"     class="text-xs font-medium py-1 transition">Queued</button>
            <button onclick="setJobFilter('done')"   id="jf-done"       class="text-xs font-medium py-1 transition">Done</button>
            <button onclick="setJobFilter('failed')" id="jf-failed"     class="text-xs font-medium py-1 transition">Failed</button>
          </div>
          <button onclick="loadJobs()" class="text-xs px-3 py-1 rounded bg-slate-700 hover:bg-slate-600 transition">Refresh</button>
        </div>
        <div class="overflow-x-auto">
          <table class="w-full text-sm">
            <thead>
              <tr class="text-slate-500 text-xs uppercase border-b border-slate-700">
                <th class="px-4 py-2 text-left w-28">Status</th>
                <th class="px-4 py-2 text-left">File</th>
                <th class="px-4 py-2 text-right w-20">Matches</th>
                <th class="px-4 py-2 text-right w-32">Updated</th>
              </tr>
            </thead>
            <tbody id="job-tbody">
              <tr><td colspan="5" class="px-4 py-6 text-center text-slate-500">Loading…</td></tr>
            </tbody>
          </table>
        </div>
      </section>

      <!-- Detail panel -->
      <section id="detail-panel" class="hidden bg-slate-800 rounded-xl border border-slate-700 p-5">
        <div class="flex items-center justify-between mb-4">
          <h2 class="text-sm font-semibold text-slate-400 uppercase tracking-wider">Job Detail</h2>
          <button onclick="closeDetail()" class="text-slate-500 hover:text-slate-300 text-lg leading-none">&times;</button>
        </div>
        <div id="detail-content"></div>
      </section>

    </div><!-- /page-jobs -->

    <!-- ═══════════════ WORDS PAGE ═══════════════ -->
    <div id="page-words" class="hidden space-y-5">

      <!-- Add word -->
      <section class="bg-slate-800 rounded-xl p-5 border border-slate-700">
        <h2 class="text-sm font-semibold text-slate-400 uppercase tracking-wider mb-3">Add Words / Phrases</h2>
        <div class="flex gap-2">
          <input id="new-word" type="text" placeholder="e.g. damn  or  oh my god"
            class="flex-1 bg-slate-900 border border-slate-600 rounded px-3 py-2 text-sm mono text-slate-200 placeholder-slate-500 focus:outline-none focus:border-blue-500"
            onkeydown="if(event.key==='Enter') addWord()" />
          <button onclick="addWord()"
            class="px-5 py-2 bg-blue-600 hover:bg-blue-500 rounded text-sm font-medium transition">Add</button>
        </div>
        <p id="words-msg" class="text-xs mt-2 h-4"></p>
      </section>

      <!-- Word list -->
      <section class="bg-slate-800 rounded-xl border border-slate-700 overflow-hidden">
        <div class="flex items-center justify-between px-5 py-3 border-b border-slate-700">
          <h2 class="text-sm font-semibold text-slate-400 uppercase tracking-wider">
            Word List <span id="word-count" class="text-slate-500 font-normal"></span>
          </h2>
          <input id="word-search" type="text" placeholder="Filter…"
            class="bg-slate-900 border border-slate-600 rounded px-3 py-1 text-xs mono text-slate-200 placeholder-slate-500 focus:outline-none focus:border-blue-500 w-40"
            oninput="filterWords()" />
        </div>
        <div id="word-list" class="max-h-[60vh] overflow-y-auto divide-y divide-slate-700/40">
          <p class="px-5 py-4 text-slate-500 text-sm">Loading…</p>
        </div>
      </section>

    </div><!-- /page-words -->

  </main>

  <!-- File browser modal -->
  <div id="browser-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50 p-4">
    <div class="bg-slate-800 border border-slate-700 rounded-xl w-full max-w-2xl max-h-[80vh] flex flex-col">
      <div class="flex items-center justify-between px-5 py-3 border-b border-slate-700 shrink-0">
        <h2 class="text-sm font-semibold text-slate-300">Browse Files</h2>
        <button onclick="closeBrowser()" class="text-slate-500 hover:text-slate-300 text-xl leading-none">&times;</button>
      </div>
      <div id="browser-path" class="px-5 py-2 text-xs mono text-slate-400 bg-slate-900/50 border-b border-slate-700 shrink-0 truncate"></div>
      <div id="browser-list" class="overflow-y-auto flex-1 divide-y divide-slate-700/50">
        <p class="px-5 py-4 text-slate-500 text-sm">Loading…</p>
      </div>
    </div>
  </div>

<script>
const BASE = '';
let selectedJobId = null;
let pollTimer = null;
let jobFilter = 'all';
let allWords = [];

// ── Page navigation ───────────────────────────────────────────────────────────
function showPage(name) {
  ['jobs', 'words'].forEach(p => {
    document.getElementById(`page-${p}`).classList.toggle('hidden', p !== name);
    document.getElementById(`tab-${p}`).className =
      `py-2.5 text-sm font-medium transition ${p === name ? 'tab-active' : 'tab-inactive'}`;
  });
  if (name === 'words') loadWords();
}

// ── Health ────────────────────────────────────────────────────────────────────
async function loadHealth() {
  try {
    const r = await fetch(`${BASE}/health`);
    const d = await r.json();
    const chip = document.getElementById('health-chip');
    const alive = d.worker_alive;
    chip.textContent = `${alive ? '✓' : '✗'} Worker  |  Queue: ${d.queue_depth}  |  Words: ${d.word_count}`;
    chip.className = `text-xs px-3 py-1 rounded-full mono ${alive ? 'bg-emerald-900 text-emerald-300' : 'bg-red-900 text-red-300'}`;
  } catch {
    const chip = document.getElementById('health-chip');
    chip.textContent = 'unreachable';
    chip.className = 'text-xs px-3 py-1 rounded-full mono bg-red-900 text-red-300';
  }
}

// ── Jobs ──────────────────────────────────────────────────────────────────────
function setJobFilter(f) {
  jobFilter = f;
  ['all','queued','done','failed'].forEach(k => {
    document.getElementById(`jf-${k}`).className =
      `text-xs font-medium py-1 transition ${k === f ? 'text-blue-400 border-b-2 border-blue-400' : 'text-slate-500 hover:text-slate-300'}`;
  });
  loadJobs();
}

let queuePositions = {};

async function loadJobs() {
  try {
    let jobs = [];
    queuePositions = {};

    if (jobFilter === 'queued') {
      const [pendingRes, processingRes, posRes] = await Promise.all([
        fetch(`${BASE}/jobs?status=pending`),
        fetch(`${BASE}/jobs?status=processing`),
        fetch(`${BASE}/jobs/queue-positions`),
      ]);
      const pending = pendingRes.ok ? await pendingRes.json() : [];
      const processing = processingRes.ok ? await processingRes.json() : [];
      jobs = [...processing, ...pending];
      queuePositions = posRes.ok ? await posRes.json() : {};
    } else if (jobFilter === 'done') {
      const r = await fetch(`${BASE}/jobs?status=done`);
      jobs = r.ok ? await r.json() : [];
    } else if (jobFilter === 'failed') {
      const r = await fetch(`${BASE}/jobs?status=failed`);
      jobs = r.ok ? await r.json() : [];
    } else {
      // All tab: recent 200 jobs only, no queue-positions lookup
      const r = await fetch(`${BASE}/jobs`);
      jobs = r.ok ? await r.json() : [];
    }

    renderJobs(jobs);
    scheduleJobPoll(jobs);
  } catch {
    document.getElementById('job-tbody').innerHTML =
      '<tr><td colspan="5" class="px-4 py-6 text-center text-red-400">Failed to load jobs</td></tr>';
  }
}

function scheduleJobPoll(jobs) {
  clearTimeout(pollTimer);
  const hasActive = jobs.some(j => j.status === 'pending' || j.status === 'processing');
  pollTimer = setTimeout(loadJobs, hasActive ? 2000 : 5000);
}

function renderJobs(jobs) {
  const tbody = document.getElementById('job-tbody');
  if (!jobs.length) {
    tbody.innerHTML = '<tr><td colspan="5" class="px-4 py-8 text-center text-slate-500">No jobs</td></tr>';
    return;
  }
  tbody.innerHTML = jobs.map(j => {
    const isSelected = j.job_id === selectedJobId;
    const pos = queuePositions[j.job_id];
    const badge = statusBadge(j.status, j.priority, pos);
    const file = j.file_path.split('/').pop() || j.file_path;
    const matches = j.matches ? JSON.parse(j.matches).length : (j.status === 'done' ? 0 : '—');
    const time = relativeTime(j.updated_at);
    const bar = j.status === 'processing' ? progressBar(j.progress || 0) : '';
    return `<tr class="border-b border-slate-700/50 hover:bg-slate-700/40 cursor-pointer transition ${isSelected ? 'selected' : ''}"
               onclick="showDetail('${j.job_id}')">
      <td class="px-4 py-2">${badge}</td>
      <td class="px-4 py-2 mono text-xs text-slate-300 max-w-xs">
        <div class="truncate" title="${escHtml(j.file_path)}">${escHtml(file)}</div>
        ${bar}
      </td>
      <td class="px-4 py-2 text-right mono text-slate-400">${matches}</td>
      <td class="px-4 py-2 text-right text-slate-500 text-xs">${time}</td>
    </tr>`;
  }).join('');
}

function statusBadge(status, priority, queuePos) {
  const map = {
    pending:    'bg-slate-700 text-slate-300',
    processing: 'bg-yellow-900 text-yellow-300',
    done:       'bg-emerald-900 text-emerald-300',
    failed:     'bg-red-900 text-red-300',
  };
  const icons = { pending: '⏳', processing: '⟳', done: '✓', failed: '✗' };
  const cls = map[status] || 'bg-slate-700 text-slate-300';
  let extra = '';
  if (status === 'pending' && queuePos != null) {
    extra = `<span class="ml-1 text-slate-400">#${queuePos}</span>`;
  }
  if (status === 'pending' && priority === 0) {
    extra += `<span class="ml-1 px-1 rounded bg-orange-800 text-orange-300 text-xs">HIGH</span>`;
  }
  return `<span class="inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-xs font-medium ${cls}">
    ${icons[status] || ''} ${status}${extra}
  </span>`;
}

function relativeTime(iso) {
  if (!iso) return '—';
  const diff = (Date.now() - new Date(iso).getTime()) / 1000;
  if (diff < 60) return `${Math.round(diff)}s ago`;
  if (diff < 3600) return `${Math.round(diff / 60)}m ago`;
  return `${Math.round(diff / 3600)}h ago`;
}

// ── Detail ────────────────────────────────────────────────────────────────────
async function showDetail(jobId) {
  selectedJobId = jobId;
  document.querySelectorAll('#job-tbody tr').forEach(tr => tr.classList.remove('selected'));
  event.currentTarget && event.currentTarget.classList.add('selected');

  const panel = document.getElementById('detail-panel');
  const content = document.getElementById('detail-content');
  panel.classList.remove('hidden');
  content.innerHTML = '<p class="text-slate-500 text-sm">Loading…</p>';

  try {
    const r = await fetch(`${BASE}/jobs/${jobId}`);
    if (!r.ok) throw new Error();
    renderDetail(await r.json());
  } catch {
    content.innerHTML = '<p class="text-red-400 text-sm">Failed to load job detail.</p>';
  }
}

function renderDetail(job) {
  const matches = job.matches ? JSON.parse(job.matches) : [];
  const segments = job.segments ? JSON.parse(job.segments) : [];

  const matchHtml = matches.length
    ? `<div class="space-y-1">${matches.map(m => `
        <div class="flex items-center gap-3 text-xs mono bg-slate-900 rounded px-3 py-1.5">
          <span class="text-red-400 font-semibold">${escHtml(m.word)}</span>
          <span class="text-slate-500">matched</span>
          <span class="text-slate-300">"${escHtml(m.raw)}"</span>
          <span class="ml-auto text-slate-500">${fmtTime(m.start)} – ${fmtTime(m.end)}</span>
        </div>`).join('')}</div>`
    : '<p class="text-slate-500 text-sm">No matches found.</p>';

  const segHtml = segments.length
    ? `<div class="flex flex-wrap gap-2 mt-2">${segments.map(s =>
        `<span class="text-xs mono bg-slate-900 px-2 py-1 rounded text-slate-300">[${s[0].toFixed(2)}s – ${s[1].toFixed(2)}s]</span>`
      ).join('')}</div>` : '';

  const errorHtml = job.error_msg
    ? `<div class="mt-4 bg-red-950 border border-red-800 rounded p-3 text-sm text-red-300 mono">${escHtml(job.error_msg)}</div>` : '';

  const detailBar = job.status === 'processing'
    ? `<div class="mt-2">${progressBar(job.progress || 0)}</div>` : '';

  document.getElementById('detail-content').innerHTML = `
    <div class="mb-3">
      <p class="text-xs text-slate-500 mono truncate">${escHtml(job.file_path)}</p>
      <div class="flex items-center gap-3 mt-1">${statusBadge(job.status, job.priority)}
        <span class="text-xs text-slate-500">ID: <span class="mono">${job.job_id}</span></span>
      </div>
      ${detailBar}
    </div>
    ${errorHtml}
    <div class="mt-4">
      <h3 class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Detected Words (${matches.length})</h3>
      ${matchHtml}
    </div>
    ${segments.length ? `<div class="mt-4">
      <h3 class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1">Muted Segments</h3>
      ${segHtml}
    </div>` : ''}`;
}

function closeDetail() {
  selectedJobId = null;
  document.getElementById('detail-panel').classList.add('hidden');
  document.querySelectorAll('#job-tbody tr').forEach(tr => tr.classList.remove('selected'));
}

// ── Submit ────────────────────────────────────────────────────────────────────
async function submitJob() {
  const input = document.getElementById('file-path');
  const msg = document.getElementById('submit-msg');
  const path = input.value.trim();
  if (!path) { openBrowser(); return; }

  msg.textContent = 'Submitting…';
  msg.className = 'text-xs mt-2 h-4 text-slate-400';

  try {
    const r = await fetch(`${BASE}/jobs`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ file_path: path }),
    });
    const d = await r.json();
    if (!r.ok) {
      msg.textContent = d.detail || 'Error';
      msg.className = 'text-xs mt-2 h-4 text-red-400';
    } else {
      msg.textContent = `Queued: ${d.job_id}`;
      msg.className = 'text-xs mt-2 h-4 text-emerald-400';
      input.value = '';
      await loadJobs();
    }
  } catch {
    msg.textContent = 'Network error';
    msg.className = 'text-xs mt-2 h-4 text-red-400';
  }
}

// ── Delete job ────────────────────────────────────────────────────────────────
async function deleteJob(jobId) {
  if (!confirm('Delete this job record?')) return;
  await fetch(`${BASE}/jobs/${jobId}`, { method: 'DELETE' });
  if (selectedJobId === jobId) closeDetail();
  await loadJobs();
}

// ── File browser ──────────────────────────────────────────────────────────────
async function openBrowser() {
  document.getElementById('browser-modal').classList.remove('hidden');
  await browseTo('/media');
}
function closeBrowser() {
  document.getElementById('browser-modal').classList.add('hidden');
}
async function browseTo(path) {
  const list = document.getElementById('browser-list');
  const pathEl = document.getElementById('browser-path');
  list.innerHTML = '<p class="px-5 py-4 text-slate-500 text-sm">Loading…</p>';
  try {
    const r = await fetch(`${BASE}/browse?path=${encodeURIComponent(path)}`);
    if (!r.ok) { const d = await r.json(); list.innerHTML = `<p class="px-5 py-4 text-red-400 text-sm">${escHtml(d.detail||'Error')}</p>`; return; }
    const data = await r.json();
    pathEl.textContent = data.current;
    let html = '';
    if (data.parent) html += `<div class="flex items-center gap-3 px-5 py-2.5 hover:bg-slate-700/50 cursor-pointer transition" onclick="browseTo('${escAttr(data.parent)}')"><span class="text-slate-400">&#8593;</span><span class="text-sm text-slate-400">..</span></div>`;
    if (!data.entries.length) html += '<p class="px-5 py-4 text-slate-500 text-sm">Empty folder</p>';
    for (const e of data.entries) {
      if (e.is_dir) {
        html += `<div class="flex items-center gap-3 px-5 py-2.5 hover:bg-slate-700/50 cursor-pointer transition" onclick="browseTo('${escAttr(e.path)}')"><span class="text-blue-400">&#128193;</span><span class="text-sm">${escHtml(e.name)}</span></div>`;
      } else if (e.is_media) {
        html += `<div class="flex items-center gap-3 px-5 py-2.5 hover:bg-slate-700/50 cursor-pointer transition" onclick="selectFile('${escAttr(e.path)}')"><span class="text-emerald-400">&#127909;</span><span class="text-sm">${escHtml(e.name)}</span><span class="ml-auto text-xs text-emerald-600">select</span></div>`;
      } else {
        html += `<div class="flex items-center gap-3 px-5 py-2.5 opacity-40 cursor-default"><span class="text-slate-500">&#128196;</span><span class="text-sm text-slate-400">${escHtml(e.name)}</span></div>`;
      }
    }
    list.innerHTML = html;
  } catch { list.innerHTML = '<p class="px-5 py-4 text-red-400 text-sm">Failed to load directory</p>'; }
}
function selectFile(path) {
  document.getElementById('file-path').value = path;
  closeBrowser();
}
document.getElementById('browser-modal').addEventListener('click', function(e) { if (e.target === this) closeBrowser(); });

// ── Bad words ─────────────────────────────────────────────────────────────────
async function loadWords() {
  document.getElementById('word-list').innerHTML = '<p class="px-5 py-4 text-slate-500 text-sm">Loading…</p>';
  try {
    const r = await fetch(`${BASE}/words`);
    const d = await r.json();
    allWords = d.words;
    renderWords(allWords);
  } catch {
    document.getElementById('word-list').innerHTML = '<p class="px-5 py-4 text-red-400 text-sm">Failed to load words</p>';
  }
}

function filterWords() {
  const q = document.getElementById('word-search').value.toLowerCase();
  renderWords(q ? allWords.filter(w => w.includes(q)) : allWords);
}

function renderWords(words) {
  document.getElementById('word-count').textContent = `(${words.length})`;
  if (!words.length) {
    document.getElementById('word-list').innerHTML = '<p class="px-5 py-4 text-slate-500 text-sm">No words found</p>';
    return;
  }
  document.getElementById('word-list').innerHTML = words.map(w =>
    `<div class="flex items-center justify-between px-5 py-2 hover:bg-slate-700/30 group">
      <span class="mono text-sm text-slate-300">${escHtml(w)}</span>
      <button onclick="removeWord('${escAttr(w)}')"
        class="text-slate-700 group-hover:text-red-400 transition text-base leading-none" title="Remove">&times;</button>
    </div>`
  ).join('');
}

async function addWord() {
  const input = document.getElementById('new-word');
  const msg = document.getElementById('words-msg');
  const word = input.value.trim();
  if (!word) return;

  try {
    const r = await fetch(`${BASE}/words`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ words: [word] }),
    });
    const d = await r.json();
    if (!r.ok) throw new Error(d.detail);
    msg.textContent = `Added. Total: ${d.word_count} words.`;
    msg.className = 'text-xs mt-2 h-4 text-emerald-400';
    input.value = '';
    await loadWords();
    loadHealth();
  } catch (e) {
    msg.textContent = e.message || 'Error';
    msg.className = 'text-xs mt-2 h-4 text-red-400';
  }
}

async function removeWord(word) {
  try {
    await fetch(`${BASE}/words`, {
      method: 'DELETE',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ words: [word] }),
    });
    await loadWords();
    loadHealth();
  } catch {
    alert('Failed to remove word');
  }
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function progressBar(pct) {
  const label = pct < 90 ? `Transcribing ${pct}%` : pct < 100 ? `Muting audio…` : `Done`;
  return `<div class="mt-1">
    <div class="w-full bg-slate-700 rounded-full h-1.5">
      <div class="bg-yellow-400 h-1.5 rounded-full transition-all duration-500" style="width:${pct}%"></div>
    </div>
    <span class="text-slate-500 text-xs">${label}</span>
  </div>`;
}

function fmtTime(secs) {
  if (secs == null) return '?';
  const m = Math.floor(secs / 60);
  const s = (secs % 60).toFixed(1).padStart(4, '0');
  return `${m}:${s}`;
}
function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escAttr(str) {
